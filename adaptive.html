<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant - Adaptive</title>
    <style>
        /*reset margins and paddings*/
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        /*DEFAULT DESKTOP LAYOUT (Fixed 960px)*/

        .container {
            width: 960px; /*fixed width*/
            margin: 0 auto; /*auto to align in center*/
        } 
        
        /*navigation*/
        nav a {
            display: inline-block;
            width: 150px; /*fixed link width*/
            text-align: center;
        }

        /*two-column layout + float*/
        .menu-section {
            width: 600px; /*fixed column width*/
            float: left;
        }
        .specials-section {
            width: 320px; /*fixed column width*/
            float: right;
        }

        /*footer in center*/
        footer{
            text-align: center;
        }

        /*footer to not to overlap with columns*/
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }

        /*TABLET BREAKPOINT (screen bellow 992px)*/

        @media (max-width: 992px) {
            .container {
                width: 720px; /*new smaller fixed container width*/
            }
            nav a {
                width: 120px; /*smaller fixed links*/
            }
            .menu-section {
                width: 450px; /*smaller fixed columns*/
            }
            .specials-section {
                width: 240px; /*smaller fixed columns*/
            }
        }

        /*MOBILE BREAKPOINTS (Screen width below 768px)*/
        @media (max-width: 768px) {
            .container {
                width: 320px; /*small fixed mobile width*/
            }
            nav a {
                display: block;
                width: 100%; /*links stack vertically instead of next to each other*/
                text-align: left;
            }
            .menu-section {
                width: 300px; /*mobile column width*/
                float: none; /*disables side-by-side float alignment*/
            }
            .specials-section {
                width: 300px; /*mobile column width*/
                float: none; /*disables side-by-side float alignment*/
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Vladimirs Restaurant</h1>
            <p>Traditional Italian Cuisine</p>
        </header>
        <nav>
            <a href="#">Home</a>
            <a href="#">Menu</a>
            <a href="#">Specials</a>
            <a href="#">Contact</a>
        </nav>
        <div class="clearfix">
            <main class="menu-section">
                <h2>Our Menu</h2>
                <p>Spaghetti Carbonara - 20.00 CHF </p>
                <p>Margherita Pizza - 24.00 CHF </p>
                <p>Lasagna - 22.00 CHF </p>
            </main>
            <aside class="specials-section">
                <h2>Today's Specials</h2>
                <p>Truffle Tagliatelle - 30.00 CHF </p>
            </aside>
        </div>

        <footer>
            <p>&copy; 2026 Vladimirs Restaurant </p>
        </footer>
</body>
</html>
