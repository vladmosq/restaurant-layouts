<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant - Fixed </title>
    <style>
        /*reset margins and paddings*/
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /*main container locked*/
        /*auto to align in center*/
        .container {
            width: 960px;
            margin: 0 auto;
        } 
        
        /*navigation*/
        nav a {
            display: inline-block;
            width: 150px;
            text-align: center;
        }

        /*two-column layout + float*/
        .menu-section {
            width: 600px;
            float: left;
        }
        .specials-section {
            width: 320 px;
            float: right;
        }

        /*footer to not to overlap with columns*/
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Vladimirs Restaurant</h1>
            <p>Traditional Italian Cuisine</p>
        </header>
        <nav>
            <a href="#">Home</a>
            <a href="#">Menu</a>
            <a href="#">Specials</a>
            <a href="#">Contact</a>
        </nav>
        <div class="clearfix">
            <main class="menu-section">
                <h2>Our Menu</h2>
                <p>Spaghetti Carbonara - 20.00 CHF </p>
                <p>Margherita Pizza - 24.00 CHF </p>
                <p>Lasagna - 22.00 CHF </p>
            </main>
            <aside class="specials-section">
                <h2>Today's Specials</h2>
                <p>Truffle Tagliatelle - 30.00 CHF </p>
            </aside>
        </div>

        <footer>
            <p>&copy; 2026 Vladimirs Restaurant </p>
        </footer>
</body>
</html>
